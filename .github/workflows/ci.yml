name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, lint, test, build
    runs-on: ubuntu-latest
    env:
      # Build-time placeholders (no real services are contacted during build).
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_cHJlc2VudC1jYXR0bGUtNDIuY2xlcmsuYWNjb3VudHMuZGV2JA==
      CLERK_SECRET_KEY: sk_test_ci_placeholder
      TURSO_DATABASE_URL: file:./local.db
      TURSO_AUTH_TOKEN: ''
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm exec next lint --max-warnings 0

      - name: Unit + integration tests
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e:
    name: Playwright (preview)
    runs-on: ubuntu-latest
    needs: quality
    # Only runs when a preview URL + Clerk test credentials are configured.
    if: ${{ vars.PLAYWRIGHT_BASE_URL != '' }}
    env:
      PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
      E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run E2E flows
        run: pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
